<!DOCTYPE html>
<html>
<head><title>Authenticating...</title></head>
<body>
<script>
  // Parse the token from the URL hash
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const error = params.get('error');

  if (token) {
    // Send token back to the dashboard window
    window.opener.postMessage({ type: 'GOOGLE_TOKEN', token }, 'https://jessiharm.github.io');
    window.close();
  } else if (error) {
    window.opener.postMessage({ type: 'GOOGLE_ERROR', error }, 'https://jessiharm.github.io');
    window.close();
  } else {
    document.body.innerHTML = 'Authentication failed. You can close this window.';
  }
</script>
</body>
</html>
